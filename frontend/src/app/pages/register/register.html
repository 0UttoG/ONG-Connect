<app-navbar></app-navbar>

<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
        <div class="w-12 h-12 bg-teal-600 rounded-lg flex items-center justify-center shadow-md">
            <span class="text-white font-bold text-2xl">♥</span>
        </div>
    </div>
    <h2 class="mt-4 text-center text-3xl font-extrabold text-gray-900">
      Únete como Donante
    </h2>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl shadow-gray-100 sm:rounded-xl sm:px-10 border border-gray-100">
      
      <form class="space-y-5" (ngSubmit)="registrar()">
        
        <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-gray-700">Nombre</label>
              <input type="text" [(ngModel)]="usuario.nombre" name="nombre" required placeholder="Ej: Juan"
                class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500">
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700">Apellido</label>
              <input type="text" [(ngModel)]="usuario.apellido" name="apellido" required placeholder="Ej: Pérez"
                class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500">
            </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700">Correo Electrónico</label>
          <input type="email" [(ngModel)]="usuario.correo" name="correo" required placeholder="ejemplo@correo.com"
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500">
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700">Teléfono</label>
            <input type="tel" [(ngModel)]="usuario.telefono" name="telefono" required placeholder="7777-7777"
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500">
          </div>

        <div>
          <label class="block text-sm font-bold text-gray-700">Contraseña</label>
          <input type="password" [(ngModel)]="usuario.password" name="password" required placeholder="********"
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500">
        </div>

        <div>
          <button type="submit"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-all transform active:scale-95">
            Registrarme Ahora
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
