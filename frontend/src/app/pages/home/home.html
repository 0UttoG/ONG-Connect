<app-navbar></app-navbar>

<div class="bg-slate-50 min-h-screen pb-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-10">
        
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Proyectos Destacados</h2>
            <p class="text-gray-500 mt-1">Tu aporte cambia vidas hoy mismo.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <app-project-card 
                *ngFor="let p of proyectos"
                [titulo]="p.titulo"
                [categoria]="p.categoria"
                [imagenUrl]="p.img"
                [montoRecaudado]="p.recaudado"
                [metaMonto]="p.meta">
            </app-project-card>
        </div>

    </div>
</div>
