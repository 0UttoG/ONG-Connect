<app-navbar></app-navbar>

<div class="bg-slate-50 min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        
        <div class="bg-teal-700 py-8 px-8 text-center text-white">
            <h1 class="text-3xl font-bold mb-2">Haz tu Donación</h1>
            <p class="text-teal-100">Tu generosidad transforma vidas directamente.</p>
        </div>

        <div class="p-8">
            <form (ngSubmit)="procesarDonacion()" class="space-y-8">
                
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2 flex items-center">
                        <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center mr-3 text-sm">1</span>
                        Selecciona tu Causa
                    </h2>
                    <select [(ngModel)]="proyectoSeleccionado" name="proyecto" class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500 text-gray-700 font-medium bg-gray-50 cursor-pointer outline-none transition-all hover:border-teal-400">
                        <option *ngFor="let p of proyectosLista" [value]="p">{{ p }}</option>
                    </select>
                </div>

                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2 flex items-center">
                        <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center mr-3 text-sm">2</span>
                        ¿Cuánto deseas aportar?
                    </h2>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                        <button type="button" (click)="seleccionarMonto(10)" [class]="montoSeleccionado === 10 && !montoPersonalizado ? 'bg-teal-600 text-white border-teal-600 shadow-md transform -translate-y-1' : 'bg-white text-gray-600 border-gray-200 hover:border-teal-400'" class="border-2 rounded-xl py-3 text-xl font-bold transition-all">
                            $10
                        </button>
                        <button type="button" (click)="seleccionarMonto(25)" [class]="montoSeleccionado === 25 && !montoPersonalizado ? 'bg-teal-600 text-white border-teal-600 shadow-md transform -translate-y-1' : 'bg-white text-gray-600 border-gray-200 hover:border-teal-400'" class="border-2 rounded-xl py-3 text-xl font-bold transition-all">
                            $25
                        </button>
                        <button type="button" (click)="seleccionarMonto(50)" [class]="montoSeleccionado === 50 && !montoPersonalizado ? 'bg-teal-600 text-white border-teal-600 shadow-md transform -translate-y-1' : 'bg-white text-gray-600 border-gray-200 hover:border-teal-400'" class="border-2 rounded-xl py-3 text-xl font-bold transition-all">
                            $50
                        </button>
                        <button type="button" (click)="seleccionarMonto(100)" [class]="montoSeleccionado === 100 && !montoPersonalizado ? 'bg-teal-600 text-white border-teal-600 shadow-md transform -translate-y-1' : 'bg-white text-gray-600 border-gray-200 hover:border-teal-400'" class="border-2 rounded-xl py-3 text-xl font-bold transition-all">
                            $100
                        </button>
                    </div>
                    
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-gray-400 font-bold text-lg">$</span>
                        </div>
                        <input type="number" [(ngModel)]="montoPersonalizado" name="montoCustom" placeholder="Ingresar otro monto (Ej: 150)" min="1" class="w-full pl-8 px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500 text-gray-700 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2 flex items-center">
                        <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center mr-3 text-sm">3</span>
                        Método de Pago
                    </h2>
                    <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 shadow-inner">
                        <div class="mb-4">
                            <label class="block text-sm font-bold text-gray-700 mb-1">Nombre en la Tarjeta</label>
                            <input type="text" placeholder="Ej: Juan Perez" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 outline-none">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-bold text-gray-700 mb-1">Número de Tarjeta</label>
                            <input type="text" placeholder="0000 0000 0000 0000" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 font-mono outline-none tracking-widest">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Vencimiento</label>
                                <input type="text" placeholder="MM/AA" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 font-mono outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">CVC</label>
                                <input type="password" placeholder="123" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-teal-500 focus:border-teal-500 font-mono outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-teal-600 text-white font-bold text-xl py-4 rounded-xl shadow-lg hover:bg-teal-700 hover:shadow-xl transition-all transform hover:-translate-y-1">
                        Completar Donación 💖
                    </button>
                    <p class="text-center text-sm text-gray-500 mt-4 flex items-center justify-center gap-2">
                        🔒 Pagos procesados de forma segura con encriptación SSL de 256 bits.
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
