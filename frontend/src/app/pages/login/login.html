<app-navbar></app-navbar>

<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
        <div class="w-12 h-12 bg-teal-600 rounded-lg flex items-center justify-center shadow-md">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
        </div>
    </div>
    <h2 class="mt-4 text-center text-3xl font-extrabold text-gray-900">
      Iniciar Sesión
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      ¿No tienes cuenta? 
      <a routerLink="/registro" class="font-medium text-teal-600 hover:text-teal-500">Regístrate aquí</a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-xl shadow-gray-100 sm:rounded-xl sm:px-10 border border-gray-100">
      
      <form class="space-y-6" (ngSubmit)="iniciarSesion()">
        
        <div>
          <label class="block text-sm font-bold text-gray-700">Correo Electrónico</label>
          <input type="email" [(ngModel)]="credenciales.correo" name="correo" required placeholder="ejemplo@correo.com"
            class="mt-1 block w-full px-3 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500">
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700">Contraseña</label>
          <input type="password" [(ngModel)]="credenciales.password" name="password" required placeholder="********"
            class="mt-1 block w-full px-3 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-teal-500 focus:border-teal-500">
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-teal-600 focus:ring-teal-500 border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-900"> Recordarme </label>
          </div>
          <div class="text-sm">
            <a href="#" class="font-medium text-teal-600 hover:text-teal-500"> ¿Olvidaste tu contraseña? </a>
          </div>
        </div>

        <div>
          <button type="submit"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-all transform active:scale-95">
            Entrar
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
