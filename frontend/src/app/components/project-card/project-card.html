<div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 flex flex-col h-full">
    <img [src]="imagen" [alt]="titulo" class="w-full h-48 object-cover">
    
    <div class="p-6 flex flex-col flex-grow">
        <h3 class="text-xl font-bold text-gray-800 mb-2">{{ titulo }}</h3>
        <p class="text-gray-600 text-sm mb-4 flex-grow">{{ descripcion }}</p>

        <div class="mb-2 flex justify-between text-sm">
            <span class="text-teal-600 font-bold">${{ montoRecaudado }} recaudados</span>
            <span class="text-gray-500">meta: ${{ metaMonto }}</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
            <div class="bg-teal-600 h-2.5 rounded-full transition-all duration-500" [style.width.%]="porcentaje"></div>
        </div>

       <button [routerLink]="['/proyecto', id]" class="w-full bg-teal-50 text-teal-700 hover:bg-teal-600 hover:text-white font-bold py-3 rounded-lg transition-colors mt-auto">
    Ver Detalles
</button>
    </div>
</div>
