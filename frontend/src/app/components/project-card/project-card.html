<div class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-all duration-300 border border-gray-100 flex flex-col h-full overflow-hidden group">
    
    <div class="h-48 overflow-hidden relative">
        <img [src]="imagenUrl" alt="Imagen del proyecto" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
        
        <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-2 py-1 rounded text-xs font-bold text-teal-700 uppercase shadow-sm">
            {{ categoria }}
        </div>
    </div>

    <div class="p-5 flex-1 flex flex-col justify-between">
        <div>
            <h3 class="text-lg font-bold text-gray-800 leading-snug mb-3">{{ titulo }}</h3>
        </div>

        <div class="mt-2">
            <div class="flex justify-between text-sm mb-1">
                <span class="font-bold text-teal-600">{{ montoRecaudado | currency }}</span>
                <span class="text-gray-400 text-xs self-end">meta {{ metaMonto | currency }}</span>
            </div>
            
            <div class="w-full bg-gray-100 rounded-full h-2.5">
                <div class="bg-teal-500 h-2.5 rounded-full transition-all duration-1000" 
                     [style.width.%]="porcentaje"></div>
            </div>
            
            <div class="text-right mt-1">
                <span class="text-xs text-gray-400 font-medium">{{ porcentaje | number:'1.0-0' }}% financiado</span>
            </div>
        </div>

        <a routerLink="/donar" class="block text-center w-full mt-5 bg-teal-600 hover:bg-teal-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-md cursor-pointer decoration-0">
            Ver detalles
        </a>
    </div>
</div>
